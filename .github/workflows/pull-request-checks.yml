name: Pull request checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php-version }})
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.5'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --configuration phpunit.xml.dist

  php-lint:
    name: PHP lint (PHP ${{ matrix.php-version }})
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.5'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Find changed PHP files
        id: changed-php-files
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          mapfile -t changed_php_files < <(git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" | grep -E '\\.php$' || true)

          if [ "${#changed_php_files[@]}" -eq 0 ]; then
            echo "No PHP files changed in this PR."
            echo "has_changed_php=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "has_changed_php=true"
            echo "files<<EOF"
            printf '%s\n' "${changed_php_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed PHP files
        if: steps.changed-php-files.outputs.has_changed_php == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            echo "Linting $file"
            php -l "$file"
          done <<< "${{ steps.changed-php-files.outputs.files }}"
